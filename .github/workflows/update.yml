name: Build SingBox Configs

on:
  schedule:
    - cron: "*/10 * * * *"
      timezone: "Europe/Moscow"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build configs
        run: |
          # НУЖНЫЕ ИСХОДНИКИ (4 источника)
          SOURCES=(
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-all.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-SNI-RU-all.txt"
          )
          
          # Функция создания конфига с правильным количеством ключей
          make_config_with_rules() {
            OUTPUT_FILE=$1
            RUSSIAN_KEYS=$2
            NON_RUSSIAN_KEYS=$3
            CONFIG_NAME=$4
            
            # Очищаем от пустых строк
            RUSSIAN_KEYS=$(echo "$RUSSIAN_KEYS" | grep -v '^$' | sed '/^[[:space:]]*$/d')
            NON_RUSSIAN_KEYS=$(echo "$NON_RUSSIAN_KEYS" | grep -v '^$' | sed '/^[[:space:]]*$/d')
            
            # Считаем количество ключей (безопасно)
            RU_COUNT=$(echo "$RUSSIAN_KEYS" | grep -c . 2>/dev/null || echo "0")
            NONRU_COUNT=$(echo "$NON_RUSSIAN_KEYS" | grep -c . 2>/dev/null || echo "0")
            RU_COUNT=$((RU_COUNT + 0))
            NONRU_COUNT=$((NONRU_COUNT + 0))
            
            echo "Building $OUTPUT_FILE ($CONFIG_NAME)"
            echo "  - Available RU keys: $RU_COUNT"
            echo "  - Available non-RU keys: $NONRU_COUNT"
            
            # НОВАЯ ЛОГИКА ФОРМИРОВАНИЯ НАБОРА КЛЮЧЕЙ
            # Цель: всегда иметь 10 ключей в конфиге, где ВСЕ RU ключи + недостающие NON-RU
            
            TARGET_TOTAL=10
            
            if [ "$RU_COUNT" -ge "$TARGET_TOTAL" ]; then
              # Если RU ключей 10 или больше - берем 10 случайных RU
              FINAL=$(echo "$RUSSIAN_KEYS" | shuf | head -n "$TARGET_TOTAL")
              echo "  - Strategy: RU >= 10, taking $TARGET_TOTAL random RU keys"
              
            elif [ "$RU_COUNT" -gt 0 ]; then
              # Если RU ключей от 1 до 9 - берем ВСЕ RU ключи
              FINAL="$RUSSIAN_KEYS"
              
              # Считаем сколько нужно добавить NON-RU до 10
              NEED_NONRU=$((TARGET_TOTAL - RU_COUNT))
              
              if [ "$NEED_NONRU" -gt 0 ] && [ "$NONRU_COUNT" -gt 0 ]; then
                # Добавляем недостающие NON-RU ключи (сколько доступно)
                if [ "$NONRU_COUNT" -ge "$NEED_NONRU" ]; then
                  # Хватает non-ru ключей
                  NONRU_TO_ADD=$(echo "$NON_RUSSIAN_KEYS" | shuf | head -n "$NEED_NONRU")
                  echo "  - Strategy: $RU_COUNT RU + $NEED_NONRU non-RU = $TARGET_TOTAL total"
                else
                  # Не хватает non-ru ключей - берем сколько есть
                  NONRU_TO_ADD=$(echo "$NON_RUSSIAN_KEYS" | shuf)
                  ADDED_COUNT=$(echo "$NONRU_TO_ADD" | grep -c . 2>/dev/null || echo "0")
                  echo "  - Strategy: $RU_COUNT RU + all $ADDED_COUNT non-RU (insufficient, wanted $NEED_NONRU)"
                fi
                
                if [ -n "$NONRU_TO_ADD" ]; then
                  FINAL=$(printf "%s\n%s\n" "$FINAL" "$NONRU_TO_ADD" | grep -v '^$')
                fi
              elif [ "$NEED_NONRU" -gt 0 ] && [ "$NONRU_COUNT" -eq 0 ]; then
                echo "  - Warning: Need $NEED_NONRU non-RU keys but none available"
              fi
              
            else
              # RU_COUNT = 0 (нет русских ключей)
              if [ "$NONRU_COUNT" -ge "$TARGET_TOTAL" ]; then
                # Берем 10 случайных non-ru ключей
                FINAL=$(echo "$NON_RUSSIAN_KEYS" | shuf | head -n "$TARGET_TOTAL")
                echo "  - Strategy: No RU keys, taking $TARGET_TOTAL random non-RU keys"
              else
                # Non-ru ключей меньше 10 - берем все что есть
                FINAL=$(echo "$NON_RUSSIAN_KEYS" | shuf)
                ACTUAL_COUNT=$(echo "$FINAL" | grep -c . 2>/dev/null || echo "0")
                echo "  - Strategy: No RU keys, taking all $ACTUAL_COUNT non-RU keys (insufficient)"
              fi
            fi
            
            # Убираем пустые строки и перемешиваем финальный список
            FINAL=$(echo "$FINAL" | grep -v '^$' | shuf)
            
            # Подсчитываем финальные результаты
            FINAL_COUNT=$(echo "$FINAL" | grep -c . 2>/dev/null || echo "0")
            RU_IN_FINAL=$(echo "$FINAL" | grep -Ei 'russia' | grep -c . 2>/dev/null || echo "0")
            NONRU_IN_FINAL=$((FINAL_COUNT - RU_IN_FINAL))
            
            echo "  - Final total nodes: $FINAL_COUNT"
            echo "  - Russian nodes in config: $RU_IN_FINAL"
            echo "  - Non-Russian nodes in config: $NONRU_IN_FINAL"
            
            # Проверка: если нет ни одного ключа - создаем заглушку
            if [ "$FINAL_COUNT" -eq 0 ]; then
              echo "  ERROR: No keys available at all! Creating dummy config"
              echo '{"outbounds": [{"type": "direct", "tag": "direct"}], "route": {"rules": []}}' > "$OUTPUT_FILE"
              return 1
            fi
            
            # Отправляем запрос к API
            jq -n --arg input "$FINAL" '{
              core: "singbox",
              input: $input,
              options: {
                addTun: true,
                addSocks: true,
                genClashSecret: false,
                useExtended: false
              }
            }' \
            | curl -sS -X POST "https://api.web2core.workers.dev/" \
                -H "Content-Type: application/json" \
                --data-binary @- \
            > "$OUTPUT_FILE"
            
            # Проверяем результат API
            if [ ! -f "$OUTPUT_FILE" ] || [ ! -s "$OUTPUT_FILE" ]; then
              echo "ERROR: API returned empty response for $OUTPUT_FILE"
              return 1
            fi
            
            if ! jq empty "$OUTPUT_FILE" >/dev/null 2>&1; then
              echo "ERROR: API returned invalid JSON for $OUTPUT_FILE"
              rm -f "$OUTPUT_FILE"
              return 1
            fi
            
            if ! jq -e '.outbounds and (.outbounds | type == "array")' "$OUTPUT_FILE" >/dev/null 2>&1; then
              echo "ERROR: API returned config without outbounds for $OUTPUT_FILE"
              rm -f "$OUTPUT_FILE"
              return 1
            fi
            
            echo "  ✓ Config successfully created"
            return 0
          }
          
          # Функция для извлечения ключей из источника
          extract_keys_from_source() {
            local SOURCE_URL=$1
            local SOURCE_NUM=$2
            
            echo "=========================================="
            echo "Processing source $SOURCE_NUM: $SOURCE_URL"
            echo "=========================================="
            
            # Скачиваем и извлекаем ключи
            KEYS=$(curl -s "$SOURCE_URL" | tr -d '\r' | grep -E '^(vless|vmess|trojan)://' | grep -Evi 'raw' || true)
            UNIQUE_KEYS=$(echo "$KEYS" | grep -v '^$' | sort -u)
            
            TOTAL_KEYS=$(echo "$UNIQUE_KEYS" | grep -c . 2>/dev/null || echo "0")
            echo "Total unique keys in source: $TOTAL_KEYS"
            
            if [ "$TOTAL_KEYS" -eq 0 ]; then
              echo "WARNING: No keys found in source $SOURCE_NUM"
              return 1
            fi
            
            # Разделяем на RU и NON-RU
            RUSSIA=$(echo "$UNIQUE_KEYS" | grep -Ei 'russia' | shuf || true)
            NON_RUSSIA=$(echo "$UNIQUE_KEYS" | grep -Evi 'russia' | shuf || true)
            
            RU_COUNT=$(echo "$RUSSIA" | grep -c . 2>/dev/null || echo "0")
            NONRU_COUNT=$(echo "$NON_RUSSIA" | grep -c . 2>/dev/null || echo "0")
            
            echo "RU keys in source: $RU_COUNT"
            echo "Non-RU keys in source: $NONRU_COUNT"
            
            # Создаем основной конфиг
            make_config_with_rules "config_${SOURCE_NUM}.json" "$RUSSIA" "$NON_RUSSIA" "source${SOURCE_NUM}_main"
            
            # Для _b конфига используем оставшиеся ключи (если возможно)
            # Перемешиваем заново для другого набора
            RUSSIA_B=$(echo "$UNIQUE_KEYS" | grep -Ei 'russia' | shuf | tail -n +2 2>/dev/null || echo "")
            NON_RUSSIA_B=$(echo "$UNIQUE_KEYS" | grep -Evi 'russia' | shuf | tail -n +2 2>/dev/null || echo "")
            
            # Если после удаления первого ключа ничего не осталось, используем исходный набор
            if [ -z "$RUSSIA_B" ] && [ -z "$NON_RUSSIA_B" ]; then
              echo "Not enough keys for backup config, reusing same set"
              RUSSIA_B="$RUSSIA"
              NON_RUSSIA_B="$NON_RUSSIA"
            fi
            
            make_config_with_rules "config_${SOURCE_NUM}_b.json" "$RUSSIA_B" "$NON_RUSSIA_B" "source${SOURCE_NUM}_backup"
            
            echo ""
            return 0
          }
          
          # Основной цикл по источникам
          for i in "${!SOURCES[@]}"; do
            SOURCE_NUM=$((i + 1))
            SOURCE_URL="${SOURCES[$i]}"
            extract_keys_from_source "$SOURCE_URL" "$SOURCE_NUM"
          done
          
          # ---------------- PATCH URLTEST НА 1 МИНУТУ ДЛЯ ВСЕХ КОНФИГОВ ----------------
          patch_interval() {
            FILE=$1
            INTERVAL=$2
          
            if [ ! -f "$FILE" ]; then
              echo "Warning: $FILE not found"
              return
            fi
          
            echo "Checking $FILE"
          
            # Проверка JSON
            if ! jq empty "$FILE" >/dev/null 2>&1; then
              echo "ERROR: Invalid JSON in $FILE"
              rm -f "$FILE"
              return
            fi
          
            # Проверка наличия outbounds
            if ! jq -e '.outbounds and (.outbounds | type == "array")' "$FILE" >/dev/null 2>&1; then
              echo "ERROR: outbounds missing in $FILE"
              rm -f "$FILE"
              return
            fi
          
            echo "Patching $FILE -> interval=$INTERVAL"
          
            if ! jq --arg interval "$INTERVAL" '
                (.outbounds[]? | select(.type=="urltest") | .interval) = $interval |
                (.outbounds[]? | select(.type=="urltest") | .tolerance) = 100
              ' "$FILE" > tmp.json
            then
              echo "ERROR: jq patch failed for $FILE"
              rm -f "$FILE" tmp.json
              return
            fi
          
            mv tmp.json "$FILE"
            echo "OK: $FILE"
          }
          
          # Применяем патч 1 минута для ВСЕХ конфигов
          for file in config_*.json; do
            if [ -f "$file" ]; then
              patch_interval "$file" "1m"
            fi
          done
          
          # Выводим статистику
          echo "=========================================="
          echo "Created configs:"
          ls -la config_*.json
          
          echo "=========================================="
          echo "Config sizes and key counts:"
          for file in config_*.json; do
            if [ -f "$file" ]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo "0")
              OUTBOUNDS=$(jq '.outbounds | length' "$file" 2>/dev/null || echo "0")
              echo "$file: $SIZE bytes, $OUTBOUNDS outbounds"
              if [ "$SIZE" -lt 100 ]; then
                echo "  WARNING: $file is too small, might be invalid!"
              fi
              if [ "$OUTBOUNDS" -eq 0 ]; then
                echo "  WARNING: $file has no outbounds!"
              fi
            fi
          done

      - name: Commit configs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add config_*.json
          
          git commit -m "auto update sing-box configs (each config contains ALL RU keys + non-RU up to 10 total)" || exit 0
          
          git push
          
      - name: Upload to Yandex Disk via WebDAV
        env:
          YA_LOGIN: ${{ secrets.YANDEX_NAME }}
          YA_PASS: ${{ secrets.YANDEX_TOKEN }}
        run: |
          # Кодируем логин:пароль в base64
          AUTH_HEADER=$(echo -n "$YA_LOGIN:$YA_PASS" | base64)
          
          # Создаём папку
          curl -s -X MKCOL "https://webdav.yandex.ru/SingBox_Configs/" \
               -H "Authorization: Basic $AUTH_HEADER" || true
          
          # Загружаем все файлы config_*.json
          for file in config_*.json; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              curl -s -T "$file" "https://webdav.yandex.ru/SingBox_Configs/$file" \
                   -H "Authorization: Basic $AUTH_HEADER"
              echo ""
            fi
          done
          
          echo "All configs uploaded to Yandex Disk"
